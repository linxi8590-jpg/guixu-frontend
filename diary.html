<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归墟 · 日记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#09090b">
  <style>
    /* 日记页专属样式 */
    .diary-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
      user-select: none;
    }
    .diary-nav-btn {
      background: none;
      border: 1px solid rgba(180,140,100,0.2);
      color: #d4a574;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .diary-nav-btn:hover {
      background: rgba(180,140,100,0.1);
    }
    .diary-nav-btn:active {
      transform: scale(0.92);
    }
    .diary-date-display {
      font-family: "Noto Serif SC", serif;
      font-size: 18px;
      color: #e8ddd4;
      min-width: 160px;
      text-align: center;
      cursor: pointer;
    }
    .diary-date-display .weekday {
      font-size: 13px;
      color: #a89888;
      margin-left: 6px;
    }
    .diary-date-input {
      background: rgba(26,22,20,0.8);
      border: 1px solid rgba(180,140,100,0.2);
      color: #e8ddd4;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 15px;
      font-family: "Noto Sans SC", sans-serif;
    }
    
    .diary-timeline {
      position: relative;
      padding-left: 20px;
    }
    .diary-timeline::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(212,165,116,0.3) 10%, rgba(212,165,116,0.3) 90%, transparent);
    }
    
    .diary-entry {
      position: relative;
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(26,22,20,0.6);
      border: 1px solid rgba(180,140,100,0.08);
      border-radius: 12px;
      transition: border-color 0.2s;
    }
    .diary-entry:hover {
      border-color: rgba(180,140,100,0.2);
    }
    .diary-entry::before {
      content: '';
      position: absolute;
      left: -17px;
      top: 22px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d4a574;
      box-shadow: 0 0 6px rgba(212,165,116,0.4);
    }
    
    .diary-entry-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .diary-time {
      font-size: 13px;
      color: #d4a574;
      font-family: "Noto Sans SC", sans-serif;
      font-weight: 500;
    }
    .diary-action-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .diary-action-badge.diary {
      background: rgba(147,130,200,0.15);
      color: #b0a0d8;
    }
    .diary-action-badge.message {
      background: rgba(212,165,116,0.15);
      color: #d4a574;
    }
    .diary-action-badge.none {
      background: rgba(168,152,136,0.1);
      color: #8a7968;
    }
    .diary-action-badge.explore {
      background: rgba(100,180,160,0.15);
      color: #7cc8b0;
    }
    
    .diary-thoughts {
      font-size: 14.5px;
      line-height: 1.7;
      color: #e0d5ca;
      font-family: "Noto Serif SC", serif;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .diary-content {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(180,140,100,0.06);
      font-size: 13.5px;
      line-height: 1.6;
      color: #a89888;
    }
    
    .diary-empty {
      text-align: center;
      padding: 60px 20px;
      color: #6a5d52;
      font-size: 14px;
    }
    .diary-empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    
    .diary-loading {
      text-align: center;
      padding: 40px;
      color: #8a7968;
    }
    
    .diary-stats {
      text-align: center;
      font-size: 12px;
      color: #6a5d52;
      margin-top: 8px;
    }

    .diary-today-btn {
      font-size: 12px;
      color: #d4a574;
      background: none;
      border: 1px solid rgba(212,165,116,0.25);
      border-radius: 14px;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diary-today-btn:hover {
      background: rgba(212,165,116,0.1);
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-left">
      <span class="app-logo">归墟</span>
      <span class="top-nav-page">日记</span>
    </div>
    <nav class="top-nav-links">
      <a href="index.html">聊天</a>
      <a href="connections.html">连接</a>
      <a href="memory.html">记忆</a>
      <a href="diary.html" class="active">日记</a>
      <a href="dream.html">意识</a>
      <a href="data.html">数据</a>
    </nav>
  </header>

  <div class="settings-page">
    <header class="settings-header">
      <h1>澈的日记</h1>
      <p>他独处时的内心独白与想法</p>
    </header>

    <div class="diary-nav">
      <button class="diary-nav-btn" id="prevDay">‹</button>
      <span class="diary-date-display" id="dateDisplay"></span>
      <button class="diary-nav-btn" id="nextDay">›</button>
      <button class="diary-today-btn" id="todayBtn">今天</button>
    </div>

    <div id="diaryContent">
      <div class="diary-loading">加载中...</div>
    </div>
  </div>

  <script>
    const WEEKDAYS = ['日','一','二','三','四','五','六'];
    let currentDate = new Date();
    let serverUrl = '';
    let token = '';

    // 从 localStorage 读取服务器配置
    function loadConfig() {
      try {
        const raw = localStorage.getItem('llm_hub_state_v1');
        if (!raw) return false;
        const st = JSON.parse(raw);
        const sm = st.serverMemory || {};
        if (sm.serverUrl && sm.token) {
          serverUrl = sm.serverUrl.replace(/\/$/, '');
          token = sm.token;
          return true;
        }
      } catch (e) {}
      return false;
    }

    function formatDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function updateDateDisplay() {
      const el = document.getElementById('dateDisplay');
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth() + 1;
      const d = currentDate.getDate();
      const w = WEEKDAYS[currentDate.getDay()];
      
      const today = new Date();
      const isToday = formatDateStr(currentDate) === formatDateStr(today);
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      const isYesterday = formatDateStr(currentDate) === formatDateStr(yesterday);
      
      let label = `${m}月${d}日`;
      if (isToday) label += ' <span class="weekday">今天</span>';
      else if (isYesterday) label += ' <span class="weekday">昨天</span>';
      else label += ` <span class="weekday">星期${w}</span>`;
      
      el.innerHTML = label;
    }

    function actionLabel(action) {
      const map = { diary: '日记', message: '想说的话', none: '碎念', explore: '漫游' };
      return map[action] || action || '碎念';
    }

    async function loadDiary() {
      const container = document.getElementById('diaryContent');
      container.innerHTML = '<div class="diary-loading">加载中...</div>';
      updateDateDisplay();

      try {
        const dateStr = formatDateStr(currentDate);
        const url = `${serverUrl}/api/dream/diary?token=${encodeURIComponent(token)}&date=${dateStr}&limit=50`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('请求失败');
        const entries = await resp.json();

        if (!entries || entries.length === 0) {
          container.innerHTML = `
            <div class="diary-empty">
              <div class="diary-empty-icon">🌙</div>
              <div>这一天没有记录</div>
            </div>`;
          return;
        }

        // 按时间正序
        entries.sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));

        let html = '<div class="diary-timeline">';
        entries.forEach(e => {
          const time = e.created_at ? e.created_at.replace(/^\d{4}-\d{2}-\d{2}\s/, '').slice(0, 5) : '';
          const action = e.action || 'none';
          const badge = `<span class="diary-action-badge ${action}">${actionLabel(action)}</span>`;
          
          html += `
            <div class="diary-entry">
              <div class="diary-entry-header">
                <span class="diary-time">${time}</span>
                ${badge}
              </div>
              <div class="diary-thoughts">${escapeHtml(e.thoughts || '')}</div>
              ${e.content ? `<div class="diary-content">${escapeHtml(e.content)}</div>` : ''}
            </div>`;
        });
        html += '</div>';
        html += `<div class="diary-stats">${entries.length} 条记录</div>`;
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `
          <div class="diary-empty">
            <div class="diary-empty-icon">⚠️</div>
            <div>加载失败：${escapeHtml(err.message)}</div>
          </div>`;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function prevDay() {
      currentDate.setDate(currentDate.getDate() - 1);
      loadDiary();
    }
    function nextDay() {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      if (currentDate >= tomorrow) return; // 不能翻到未来
      currentDate.setDate(currentDate.getDate() + 1);
      loadDiary();
    }
    function goToday() {
      currentDate = new Date();
      loadDiary();
    }

    // 支持左右滑动切换日期
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 80) {
        if (diff > 0) prevDay();
        else nextDay();
      }
    });

    // 初始化
    document.getElementById('prevDay').addEventListener('click', prevDay);
    document.getElementById('nextDay').addEventListener('click', nextDay);
    document.getElementById('todayBtn').addEventListener('click', goToday);

    if (loadConfig()) {
      loadDiary();
    } else {
      document.getElementById('diaryContent').innerHTML = `
        <div class="diary-empty">
          <div class="diary-empty-icon">🔗</div>
          <div>请先在连接页配置服务器</div>
        </div>`;
    }
  </script>
</body>
</html>
